<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening 考試詞彙學習 | 英音發音練習</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card-hover: #273549;
  --border: #334155;
  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
  --purple: #a855f7;
  --pink: #ec4899;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}

.header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent-light), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header p {
  color: var(--text-secondary);
  font-size: 0.9rem;
  margin-top: 4px;
}

/* Tabs */
.tabs {
  display: flex;
  gap: 8px;
  padding: 16px 24px 0;
  overflow-x: auto;
  scrollbar-width: none;
}

.tab {
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.85rem;
  white-space: nowrap;
  transition: all 0.2s;
}

.tab:hover { border-color: var(--accent); color: var(--text); }
.tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  font-weight: 600;
}

/* Content */
.content {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px;
}

.section { display: none; }
.section.active { display: block; }

/* Search */
.search-box {
  width: 100%;
  padding: 12px 20px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 0.95rem;
  margin-bottom: 20px;
  outline: none;
  transition: border-color 0.2s;
}

.search-box:focus { border-color: var(--accent); }
.search-box::placeholder { color: var(--text-secondary); }

/* Vocabulary Card */
.vocab-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.vocab-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}

.vocab-card:hover {
  background: var(--card-hover);
  border-color: var(--accent);
  transform: translateY(-2px);
}

.vocab-card .num {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: rgba(59,130,246,0.15);
  color: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.8rem;
  font-weight: 700;
  flex-shrink: 0;
}

.vocab-card .info { flex: 1; min-width: 0; }

.vocab-card .word {
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
}

.vocab-card .pos {
  font-size: 0.75rem;
  color: var(--accent-light);
  margin-left: 4px;
}

.vocab-card .meaning {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-top: 2px;
}

.vocab-card .speak-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(59,130,246,0.2);
  color: var(--accent-light);
  cursor: pointer;
  font-size: 1.1rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.vocab-card .speak-btn:hover { background: var(--accent); color: white; }
.vocab-card .speak-btn.playing { background: var(--green); color: white; animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.15); }
}

/* Google Translate Link */
.vocab-card .gt-link {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(168,85,247,0.2);
  color: var(--purple);
  cursor: pointer;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
  text-decoration: none;
}

.vocab-card .gt-link:hover { background: var(--purple); color: white; }

/* Paragraph */
.paragraph-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
}

.paragraph-card .ref {
  font-size: 0.8rem;
  color: var(--orange);
  margin-bottom: 8px;
  font-weight: 600;
}

.paragraph-card .text {
  font-size: 1.1rem;
  line-height: 2;
  color: var(--text);
  font-style: italic;
}

.paragraph-card .highlight {
  background: rgba(245,158,11,0.2);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--orange);
}

.paragraph-card .actions {
  margin-top: 16px;
  display: flex;
  gap: 8px;
}

.btn {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 600;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}

.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
.btn-outline:hover { border-color: var(--accent); }

/* Word Family Table */
.family-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 24px;
  border-radius: 12px;
  overflow: hidden;
}

.family-table th {
  background: var(--accent);
  color: white;
  padding: 12px 16px;
  text-align: left;
  font-size: 0.85rem;
}

.family-table td {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.9rem;
}

.family-table tr:hover td { background: rgba(59,130,246,0.08); }

.family-table .root {
  font-weight: 700;
  color: var(--orange);
}

.word-cell {
  cursor: pointer;
  transition: color 0.2s;
}

.word-cell:hover { color: var(--accent-light); }

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--green);
  color: white;
  padding: 10px 24px;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 600;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  z-index: 1000;
}

.toast.show { opacity: 1; }

/* Stats */
.stats {
  display: flex;
  gap: 16px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
}

.stat .stat-num {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent-light);
}

.stat .stat-label {
  font-size: 0.75rem;
  color: var(--text-secondary);
}

/* Settings */
.settings-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.settings-label {
  font-size: 0.85rem;
  color: var(--text-secondary);
}

.accent-select {
  padding: 6px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text);
  font-size: 0.85rem;
  cursor: pointer;
}

.mode-toggle {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.mode-btn {
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s;
}

.mode-btn.active {
  background: var(--accent);
  color: white;
}

/* Responsive */
@media (max-width: 640px) {
  .vocab-grid { grid-template-columns: 1fr; }
  .tabs { padding: 16px 12px 0; }
  .content { padding: 16px; }
  .header { padding: 16px; }
  .header h1 { font-size: 1.4rem; }
}

/* IPA tooltip */
.ipa-tooltip {
  font-size: 0.75rem;
  color: var(--purple);
  font-style: normal;
}
</style>

// ============================================================
// AUDIO (Web Speech API)
// ============================================================

let currentAccent = 'en-GB';
const synth = window.speechSynthesis;

function speak(text, btn) {
  synth.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = currentAccent;
  utter.rate = 0.85;
  utter.pitch = 1;

  if (btn) {
    btn.classList.add('playing');
    utter.onend = () => btn.classList.remove('playing');
    utter.onerror = () => btn.classList.remove('playing');
  }

  synth.speak(utter);
  showToast('Playing: ' + text);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================

function createVocabCard(wordData, idx) {
  const div = document.createElement('div');
  div.className = 'vocab-card';
  div.setAttribute('data-word', wordData.w.toLowerCase());

  const numSpan = document.createElement('span');
  numSpan.className = 'num';
  numSpan.textContent = idx + 1;

  const infoDiv = document.createElement('div');
  infoDiv.className = 'info';

  const wordSpan = document.createElement('div');
  wordSpan.className = 'word';
  wordSpan.innerHTML = `${wordData.w} <span class="pos">${wordData.pos}</span>`;

  const meaningDiv = document.createElement('div');
  meaningDiv.className = 'meaning';
  meaningDiv.innerHTML = `${wordData.m} <span class="ipa-tooltip">${wordData.ipa}</span>`;

  infoDiv.appendChild(wordSpan);
  infoDiv.appendChild(meaningDiv);

  const speakBtn = document.createElement('button');
  speakBtn.className = 'speak-btn';
  speakBtn.title = '聆聽發音 (英音)';
  speakBtn.innerHTML = '🔊';
  speakBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    speak(wordData.w, speakBtn);
  });

  const gtLink = document.createElement('a');
  gtLink.className = 'gt-link';
  gtLink.title = '在 Google Translate 查看口型發音';
  gtLink.innerHTML = 'G';
  gtLink.href = `https://translate.google.com/?sl=en&tl=zh-TW&text=${encodeURIComponent(wordData.w)}&op=translate`;
  gtLink.target = '_blank';

  div.appendChild(numSpan);
  div.appendChild(infoDiv);
  div.appendChild(speakBtn);
  div.appendChild(gtLink);

  // Click card to speak
  div.addEventListener('click', () => speak(wordData.w, speakBtn));

  return div;
}

function renderVocabSection(sectionId, dictKey) {
  const section = document.getElementById('section-' + sectionId);
  const data = dictData[dictKey];
  const grid = document.createElement('div');
  grid.className = 'vocab-grid';
  grid.id = 'grid-' + sectionId;

  data.words.forEach((w, i) => {
    grid.appendChild(createVocabCard(w, i));
  });

  section.innerHTML = '';
  const title = document.createElement('h2');
  title.style.cssText = 'font-size:1.2rem;margin-bottom:16px;color:var(--accent-light);';
  title.textContent = data.title + ` (${data.words.length} words)`;
  section.appendChild(title);
  section.appendChild(grid);
}

function renderReadingSection() {
  const section = document.getElementById('section-reading');
  section.innerHTML = '<h2 style="font-size:1.2rem;margin-bottom:16px;color:var(--orange);">朗讀篇章 (Reading Aloud)</h2>';

  readingParagraphs.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'paragraph-card';

    const ref = document.createElement('div');
    ref.className = 'ref';
    ref.textContent = p.ref;

    const text = document.createElement('div');
    text.className = 'text';
    let html = p.text;
    p.keywords.forEach(kw => {
      const regex = new RegExp(`(${kw})`, 'gi');
      html = html.replace(regex, '<span class="highlight">$1</span>');
    });
    text.innerHTML = html;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const playBtn = document.createElement('button');
    playBtn.className = 'btn btn-primary';
    playBtn.innerHTML = '🔊 朗讀全文';
    playBtn.addEventListener('click', () => speak(p.text, playBtn));

    const slowBtn = document.createElement('button');
    slowBtn.className = 'btn btn-outline';
    slowBtn.innerHTML = '🐢 慢速朗讀';
    slowBtn.addEventListener('click', () => {
      const utter = new SpeechSynthesisUtterance(p.text);
      utter.lang = currentAccent;
      utter.rate = 0.6;
      utter.pitch = 1;
      synth.cancel();
      synth.speak(utter);
      showToast('慢速朗讀中...');
    });

    actions.appendChild(playBtn);
    actions.appendChild(slowBtn);

    card.appendChild(ref);
    card.appendChild(text);
    card.appendChild(actions);
    section.appendChild(card);
  });
}

function renderWordFamilySection() {
  const section = document.getElementById('section-wordfamily');
  section.innerHTML = '<h2 style="font-size:1.2rem;margin-bottom:16px;color:var(--purple);">詞性轉換表 (Parts of Speech)</h2>';

  const table = document.createElement('table');
  table.className = 'family-table';

  const thead = document.createElement('thead');
  thead.innerHTML = `<tr>
    <th>Root</th><th>Adjective 形容詞</th><th>Verb 動詞</th><th>Noun 名詞</th><th>Adverb 副詞</th>
  </tr>`;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  wordFamilies.forEach(f => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="root">${f.root}</td>
      <td class="word-cell" onclick="speakWord(this)">${f.adj}</td>
      <td class="word-cell" onclick="speakWord(this)">${f.verb}</td>
      <td class="word-cell" onclick="speakWord(this)">${f.noun}</td>
      <td class="word-cell" onclick="speakWord(this)">${f.adv}</td>
    `;
    tbody.appendChild(row);
  });
  table.appendChild(tbody);
  section.appendChild(table);

  const note = document.createElement('p');
  note.style.cssText = 'font-size:0.8rem;color:var(--text-secondary);margin-top:8px;';
  note.textContent = '提示: 點擊任何詞彙即可聆聽英式發音';
  section.appendChild(note);
}

// Fallback speak for word family cells
window.speakWord = function(cell) {
  const text = cell.textContent.trim();
  if (text && text !== '—') {
    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = currentAccent;
    utter.rate = 0.85;
    synth.speak(utter);
    showToast('Playing: ' + text);
  }
};

function renderAllSection() {
  const section = document.getElementById('section-all');
  section.innerHTML = '';

  Object.keys(dictData).forEach((key, di) => {
    const data = dictData[key];
    const title = document.createElement('h2');
    title.style.cssText = 'font-size:1.1rem;margin:20px 0 12px;color:var(--accent-light);border-bottom:1px solid var(--border);padding-bottom:8px;';

    section.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'vocab-grid';
    grid.setAttribute('data-dict', key);

    data.words.forEach((w, i) => {
      grid.appendChild(createVocabCard(w, i));
    });

    section.appendChild(grid);
  });

  // Also add reading paragraphs in all section
  const sepTitle = document.createElement('h2');
  sepTitle.style.cssText = 'font-size:1.1rem;margin:20px 0 12px;color:var(--orange);border-bottom:1px solid var(--border);padding-bottom:8px;';
  sepTitle.textContent = '朗讀篇章 (Reading Aloud)';
  section.appendChild(sepTitle);

  readingParagraphs.forEach(p => {
    const card = document.createElement('div');
    card.className = 'paragraph-card';
    card.style.marginBottom = '12px';
    card.innerHTML = `<div class="ref">${p.ref}</div><div class="text">${p.text}</div>`;
    section.appendChild(card);
  });
}

// ============================================================
// SEARCH
// ============================================================

document.getElementById('searchInput').addEventListener('input', function(e) {
  const query = e.target.value.toLowerCase().trim();
  const activeSection = document.querySelector('.section.active');
  const cards = activeSection.querySelectorAll('.vocab-card');

  cards.forEach(card => {
    const word = card.getAttribute('data-word') || '';
    if (query === '' || word.includes(query)) {
      card.style.display = '';
    } else {
      card.style.display = 'none';
    }
  });

  updateStats(activeSection);
});

// ============================================================
// TABS
// ============================================================

document.getElementById('tabBar').addEventListener('click', function(e) {
  if (!e.target.classList.contains('tab')) return;

  const tab = e.target;
  const tabName = tab.getAttribute('data-tab');

  // Update active tab
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');

  // Show section
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + tabName).classList.add('active');

  // Clear search
  document.getElementById('searchInput').value = '';

  updateStats(document.getElementById('section-' + tabName));
});

// ============================================================
// STATS
// ============================================================

function updateStats(section) {
  const totalCards = section.querySelectorAll('.vocab-card').length;
  const visibleCards = section.querySelectorAll('.vocab-card[style*="display:"]').length;
  // Actually count visible ones
  let visible = 0;
  section.querySelectorAll('.vocab-card').forEach(c => {
    if (c.style.display !== 'none') visible++;
  });

  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat">
      <div class="stat-num">${visible}</div>
      <div class="stat-label">顯示詞彙</div>
    </div>
    <div class="stat">
      <div class="stat-num">${totalCards}</div>
      <div class="stat-label">總詞彙量</div>
    </div>
  `;
}

// ============================================================
// ACCENT
// ============================================================

document.getElementById('accentSelect').addEventListener('change', function() {
  currentAccent = this.value;
  synth.cancel();
  showToast('已切換為: ' + (currentAccent === 'en-GB' ? '英式發音' : '美式發音'));
});

// ============================================================
// MODE TOGGLE
// ============================================================

document.getElementById('modeToggle').addEventListener('click', function(e) {
  if (!e.target.classList.contains('mode-btn')) return;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');

  const mode = e.target.getAttribute('data-mode');
  document.querySelectorAll('.vocab-grid').forEach(grid => {
    grid.style.gridTemplateColumns = mode === 'list' ? '1fr' : 'repeat(auto-fill, minmax(280px, 1fr))';
  });
});

// ============================================================
// INIT
// ============================================================

(function init() {
  // Render individual dict sections
  Object.keys(dictData).forEach(key => {
    renderVocabSection(key, key);
  });

  // Render all-in-one
  renderAllSection();

  // Render reading
  renderReadingSection();

  // Render word family
  renderWordFamilySection();

  // Init stats
  updateStats(document.getElementById('section-all'));

  console.log('Listening Vocabulary Tool Initialized!');
  console.log('Total words: 120 | Paragraphs: 6 | Word Families: 30');
})();
</script>
